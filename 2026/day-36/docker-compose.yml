version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: postgres-db
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  monitoring-dashboard:
    build: ./server-monitoring-dashboard
    container_name: monitoring-dashboard
    ports:
      - "8080:${APP_PORT}"
    restart: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD","wget","--spider","http://localhost:${APP_PORT}"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-data:

networks:
  app-network:

